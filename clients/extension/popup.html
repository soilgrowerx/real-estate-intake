<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 0;
      margin: 0;
      background: #f8fafc;
      color: #334155;
    }
    .header {
      background: linear-gradient(135deg, #0f766e, #0d9488);
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    .content {
      padding: 16px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 4px;
    }
    textarea, input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 12px;
      font-family: inherit;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    button.harvest {
      width: 100%;
      background: #0f766e;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button.harvest:hover {
      opacity: 0.9;
    }
    .status {
      margin-top: 8px;
      font-size: 11px;
      text-align: center;
      min-height: 14px;
    }
    .success { color: #059669; }
    .error { color: #dc2626; }
    
    .settings-toggle {
      font-size: 10px;
      text-decoration: underline;
      cursor: pointer;
      color: #94a3b8;
      text-align: center;
      margin-top: 12px;
    }
    #settings {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #cbd5e1;
    }
    #settings.open {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="width: 20px; height: 20px; background: rgba(255,255,255,0.2); border-radius: 50%;"></div>
    <div class="logo">NEOCAMBRIAN CLIPPER</div>
  </div>
  <div class="content">
    <div class="field">
      <label>Content</label>
      <textarea id="content" placeholder="Selected text or page summary..."></textarea>
    </div>
    <div class="field">
      <label>Source URL</label>
      <input type="text" id="url" readonly style="background: #f1f5f9; color: #94a3b8;">
    </div>
    <button id="harvestBtn" class="harvest">HARVEST SPORE</button>
    <div id="status" class="status"></div>

    <div id="settingsToggle" class="settings-toggle">Configure Server</div>
    <div id="settings">
      <div class="field">
        <label>Server URL</label>
        <input type="text" id="serverUrl" placeholder="https://spore.arboracle.app/api/ingest">
      </div>
      <div class="field">
        <label>API Token</label>
        <input type="password" id="apiToken" placeholder="GARDEN_HARVEST_TOKEN_...">
      </div>
      <button id="saveSettings" style="width:100%; padding: 8px; cursor: pointer;">Save Config</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
